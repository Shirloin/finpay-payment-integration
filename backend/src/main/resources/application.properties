spring.config.import=optional:file:.env[.properties]

spring.application.name=${SPRING_APPLICATION_NAME}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DATABASE_PLATFORM}
spring.jpa.properties.hibernate.jdbc.time_zone=${SPRING_JPA_TIME_ZONE}
jwt.secret=${JWT_SECRET}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
finpay.merchant-id=${FINPAY_MERCHANT_ID}
finpay.merchant-key=${FINPAY_MERCHANT_KEY}
finpay.initiate-url=${FINPAY_INITIATE_URL}
finpay.check-url=${FINPAY_CHECK_URL}
finpay.success-url=${FINPAY_SUCCESS_URL}
finpay.fail-url=${FINPAY_FAIL_URL}
finpay.callback-url=${FINPAY_CALLBACK_URL}